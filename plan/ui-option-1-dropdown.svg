<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <!-- Background -->
  <rect width="1200" height="600" fill="#f8f9fa"/>

  <!-- Title -->
  <text x="600" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#1a1a2e">
    Option 1: Dropdown Menu Navigation (Desktop)
  </text>

  <!-- Navigation Bar Background -->
  <rect x="50" y="80" width="1100" height="60" rx="8" fill="#16213e" opacity="0.9"/>

  <!-- Dropdown Button 1: Celebration -->
  <g id="dropdown1">
    <rect x="80" y="100" width="180" height="40" rx="6" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
    <text x="120" y="127" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">🎉 Celebration ▼</text>
  </g>

  <!-- Dropdown Button 2: Nature -->
  <g id="dropdown2">
    <rect x="280" y="100" width="150" height="40" rx="6" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
    <text x="310" y="127" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">🌿 Nature ▼</text>
  </g>

  <!-- Dropdown Button 3: Adventure -->
  <g id="dropdown3">
    <rect x="450" y="100" width="170" height="40" rx="6" fill="#2d3748" stroke="#4a5568" stroke-width="2"/>
    <text x="480" y="127" font-family="Arial, sans-serif" font-size="16" fill="#ffffff">✈️ Adventure ▼</text>
  </g>

  <!-- Dropdown Menu (open) -->
  <g id="dropdown-open">
    <rect x="80" y="150" width="180" height="140" rx="6" fill="#ffffff" stroke="#cbd5e0" stroke-width="2"/>

    <!-- Menu Items -->
    <rect x="80" y="150" width="180" height="45" rx="6" fill="#edf2f7"/>
    <text x="100" y="177" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e">🎈 Balloons</text>

    <rect x="80" y="195" width="180" height="45" rx="0" fill="#ffffff"/>
    <text x="100" y="222" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e">🎉 Confetti</text>

    <rect x="80" y="240" width="180" height="50" rx="6" fill="#ffffff"/>
    <text x="100" y="270" font-family="Arial, sans-serif" font-size="15" fill="#1a1a2e">🎆 Fireworks</text>
  </g>

  <!-- Annotation Arrow -->
  <path d="M 300 220 Q 350 220 380 180" stroke="#ff4757" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="305" y="240" font-family="Arial, sans-serif" font-size="14" fill="#ff4757">Dropdown opens</text>
  <text x="305" y="258" font-family="Arial, sans-serif" font-size="14" fill="#ff4757">on click/hover</text>

  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff4757"/>
    </marker>
  </defs>

  <!-- Mobile View -->
  <g id="mobile-view" transform="translate(700, 80)">
    <!-- Mobile Frame -->
    <rect x="0" y="0" width="350" height="500" rx="20" fill="#1a1a2e" stroke="#2d3748" stroke-width="3"/>
    <rect x="10" y="10" width="330" height="480" rx="12" fill="#ffffff"/>

    <!-- Mobile Header -->
    <rect x="10" y="10" width="330" height="50" rx="12" fill="#16213e"/>
    <text x="30" y="42" font-family="Arial, sans-serif" font-size="18" fill="#ffffff">☰ Menu</text>

    <!-- Accordion Sections -->
    <!-- Celebration Group -->
    <rect x="20" y="70" width="310" height="35" rx="4" fill="#ff4757"/>
    <text x="35" y="92" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff">🎉 Celebration ▼</text>

    <!-- Expanded Items -->
    <rect x="30" y="110" width="290" height="30" fill="#f8f9fa"/>
    <text x="50" y="130" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">🎈 Balloons</text>

    <rect x="30" y="140" width="290" height="30" fill="#ffffff"/>
    <text x="50" y="160" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">🎉 Confetti</text>

    <rect x="30" y="170" width="290" height="30" fill="#f8f9fa"/>
    <text x="50" y="190" font-family="Arial, sans-serif" font-size="13" fill="#1a1a2e">🎆 Fireworks</text>

    <!-- Nature Group (collapsed) -->
    <rect x="20" y="210" width="310" height="35" rx="4" fill="#00dfff"/>
    <text x="35" y="232" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">🌿 Nature ▼</text>

    <!-- Adventure Group (collapsed) -->
    <rect x="20" y="255" width="310" height="35" rx="4" fill="#ffd700"/>
    <text x="35" y="277" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a2e">✈️ Adventure ▼</text>

    <!-- Mobile Label -->
    <text x="175" y="515" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#4a5568">Mobile View</text>
  </g>

  <!-- Features List -->
  <g id="features" transform="translate(50, 380)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#1a1a2e">Key Features:</text>

    <circle cx="5" cy="25" r="4" fill="#10b981"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" fill="#4a5568">Clean, organized navigation with minimal visual clutter</text>

    <circle cx="5" cy="50" r="4" fill="#10b981"/>
    <text x="20" y="55" font-family="Arial, sans-serif" font-size="14" fill="#4a5568">Familiar dropdown pattern used by many websites</text>

    <circle cx="5" cy="75" r="4" fill="#10b981"/>
    <text x="20" y="80" font-family="Arial, sans-serif" font-size="14" fill="#4a5568">Mobile: Accordion-style expandable sections</text>

    <circle cx="5" cy="100" r="4" fill="#ef4444"/>
    <text x="20" y="105" font-family="Arial, sans-serif" font-size="14" fill="#4a5568">Requires extra interaction (click/hover) to see options</text>

    <circle cx="5" cy="125" r="4" fill="#fbbf24"/>
    <text x="20" y="130" font-family="Arial, sans-serif" font-size="14" fill="#4a5568">Medium implementation complexity</text>
  </g>
</svg>